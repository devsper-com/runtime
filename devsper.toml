[swarm]
workers = 4
speculative_execution = true
cache_enabled = true
adaptive_planning = true
adaptive_execution = true
max_iterations = 10
critic_enabled = true
critic_threshold = 0.70
critic_roles = ["research", "analysis", "code"]
message_bus_enabled = true
prefetch_enabled = true
prefetch_max_age_seconds = 30
remote_agents = []

[models]
planner = "auto"
worker = "auto"

[providers.ollama]
enabled   = true
base_url  = ""      # empty → $OLLAMA_HOST → http://localhost:11434
keep_alive = "5m"
num_ctx    = 8192

[providers.zai]
enabled  = false    # set true + ZAI_API_KEY env var to activate
base_url = ""       # empty → $ZAI_BASE_URL → https://api.z.ai/v1

[providers.lmstudio]
enabled  = true
base_url = ""       # empty → $LMSTUDIO_BASE_URL → http://localhost:1234

[memory]
enabled = true

[tools]
top_k = 12

[telemetry]
trulens_enabled = true
trulens_database_url = ""   # empty = sqlite:///.devsper/trulens.sqlite
otel_enabled = true
otel_endpoint = ""
cost_tracking = true

[budget]
limit_usd = 0.0
on_exceeded = "warn"
alert_at_pct = 80

[[mcp.servers]]
name = "filesystem"
transport = "stdio"
command = ["npx", "-y", "@modelcontextprotocol/server-filesystem", "/tmp"]

[[mcp.servers]]
name = "time"
transport = "stdio"
command = ["npx", "-y", "@modelcontextprotocol/server-time"]

[hitl]
enabled = true

[[hitl.policies]]
name = "high-cost"
on_timeout = "auto_approve"
timeout_seconds = 1800
approvers = ["webhook://https://hooks.example.com/devsper"]

[[hitl.policies.triggers]]
type = "cost_above"
threshold = 0.01

[[hitl.policies.triggers]]
type = "critic_score_below"
threshold = 0.50

[export]
auto_export_on_run = true
format = "docx"  
limit = 1
