name: Publish

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (all crates)
        run: cargo build --workspace --release

      - name: Test (all crates)
        run: cargo test --workspace

  publish-crates:
    name: Publish to crates.io
    needs: test
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_PUBLISH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Checks crates.io — skips if version already published, fails loudly on real errors.
      - name: Define publish helper
        run: |
          cat << 'EOF' > /usr/local/bin/publish-if-new
          #!/usr/bin/env bash
          set -euo pipefail
          CRATE=$1
          VERSION=$(cargo metadata --no-deps --manifest-path "crates/${CRATE}/Cargo.toml" --format-version 1 \
            | jq -r '.packages[0].version')
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "User-Agent: devsper-publish-ci" \
            "https://crates.io/api/v1/crates/${CRATE}/${VERSION}")
          if [ "$HTTP" = "200" ]; then
            echo "::notice::${CRATE} v${VERSION} already on crates.io — skipping"
          else
            echo "Publishing ${CRATE} v${VERSION}..."
            cargo publish -p "${CRATE}" --no-verify
          fi
          EOF
          chmod +x /usr/local/bin/publish-if-new

      # Publish in dependency order — each layer waits for previous to index.
      - name: Publish devsper-core
        run: publish-if-new devsper-core
      - run: sleep 20

      - name: Publish devsper-graph
        run: publish-if-new devsper-graph
      - name: Publish devsper-bus
        run: publish-if-new devsper-bus
      - run: sleep 20

      - name: Publish devsper-scheduler
        run: publish-if-new devsper-scheduler
      - name: Publish devsper-executor
        run: publish-if-new devsper-executor
      - name: Publish devsper-plugins
        run: publish-if-new devsper-plugins
      - name: Publish devsper-providers
        run: publish-if-new devsper-providers
      - name: Publish devsper-memory
        run: publish-if-new devsper-memory
      - run: sleep 20

      - name: Publish devsper-compiler
        run: publish-if-new devsper-compiler
      - name: Publish devsper-cluster
        run: publish-if-new devsper-cluster
      - run: sleep 20

      - name: Publish devsper-bin
        run: publish-if-new devsper-bin

  build-wheels:
    name: Build wheels (${{ matrix.target }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          working-directory: python
          manylinux: auto
        env:
          DEVSPER_GITHUB_CLIENT_ID: ${{ secrets.DEVSPER_GITHUB_CLIENT_ID }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: python/dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/devsper/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  build-binaries:
    name: Build CLI binary (${{ matrix.target }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: devsper
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: devsper
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: devsper
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: devsper.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI binary
        run: cargo build -p devsper-bin --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/devsper-${{ matrix.target }}${{ matrix.target == 'x86_64-pc-windows-msvc' && '.exe' || '' }}

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/

  create-release:
    name: Create GitHub Release
    needs: [publish-pypi, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
          path: release-assets/

      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: release-assets/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            release-assets/*
