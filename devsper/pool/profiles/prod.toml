[pool]
profile              = "prod"
min_global_workers   = 10
min_org_workers      = 2
max_tasks_per_minute = 120
heartbeat_interval   = 30
worker_timeout_secs  = 90
redis_url            = "rediss://elasticache.internal:6380"
tls_mode             = "acm"
worker_auth          = "jwt"
payload_encryption   = true
aws_spot_enabled     = true
spot_fallback        = "on-demand"
ecs_cluster          = "devsper-nodes-prod"

[pool.logging]
level  = "WARNING"
format = "json"

[pool.limits]
max_payload_bytes = 1_048_576
max_queue_depth   = 10_000

[pool.sla]
p99_assignment_ms = 500
queue_depth_alert = 1_000

