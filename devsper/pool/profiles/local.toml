[pool]
profile              = "local"
min_global_workers   = 2
min_org_workers      = 0
max_tasks_per_minute = 60
heartbeat_interval   = 30
worker_timeout_secs  = 90
# Must match `devsper pool status` / workers unless REDIS_URL is set (use TCP for Docker Compose + local CLI).
redis_url            = "redis://127.0.0.1:6379"
tls_mode             = "none"
worker_auth          = "none"
payload_encryption   = true
local_workers        = 4
# Prefer Rust worker (pool spawns N processes). Override with `python -m devsper.pool.worker_runner` if needed.
local_worker_cmd     = "devsper-worker"

[pool.logging]
level = "DEBUG"
format = "text"

[pool.limits]
max_payload_bytes = 1_048_576
max_queue_depth   = 100

